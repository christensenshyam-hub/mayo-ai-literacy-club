[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mercurius-chatbot-production.up.railway.app; frame-ancestors 'none'"

[[redirects]]
  from = "http://mayoailiteracy.com/*"
  to = "https://mayoailiteracy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.mayoailiteracy.com/*"
  to = "https://mayoailiteracy.com/:splat"
  status = 301
  force = true
