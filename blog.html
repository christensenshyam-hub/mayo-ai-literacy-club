    <!-- BLOG LISTING -->
    <section id="blog" class="section blog-section">
        <div class="container">
            <div class="section-header">
                <span class="section-label">From the Club</span>
                <h2>Blog</h2>
            </div>
            <div class="blog-list" id="blog-list">
                <!-- Posts injected by JS -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>Mayo AI Literacy Club &copy; 2026 &nbsp;·&nbsp; <a href="https://www.instagram.com/mayoailiteracy" target="_blank" rel="noopener noreferrer" class="footer-link">@mayoailiteracy</a></p>
        </div>
    </footer>

    <script src="blog-data.js"></script>
    <script src="script.js"></script>
    <script>
        const list = document.getElementById('blog-list');

        if (!BLOG_POSTS || BLOG_POSTS.length === 0) {
            list.innerHTML = '<p class="blog-empty">No posts yet — check back soon.</p>';
        } else {
            BLOG_POSTS.forEach((post, i) => {
                const card = document.createElement('a');
                card.href = post.customUrl || `blog-post.html?id=${post.id}`;
                card.className = 'blog-card fade-in';
                card.style.animationDelay = `${i * 0.07}s`;
                card.innerHTML = `
                    <div class="blog-card-meta">
                        <span class="blog-category">${post.category}</span>
                        <span class="blog-date">${post.date}</span>
                    </div>
                    <h3 class="blog-card-title">${post.title}</h3>
                    <p class="blog-card-summary">${post.summary}</p>
                    <span class="blog-read-more">Read post →</span>
                `;
                list.appendChild(card);
            });
            window.observeFadeIns(list);
        }
    </script>
</body>
