    <script src="blog-data.js"></script>
    <script src="script.js"></script>
    <script>
        // Read ?id= from URL
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');
        const post = BLOG_POSTS.find(p => p.id === postId);
        const article = document.getElementById('post-content');

        if (!post) {
            article.innerHTML = `
                <h2>Post not found</h2>
                <p><a href="blog.html">← Back to blog</a></p>
            `;
        } else {
            // Update page title
            document.title = `${post.title} — Mayo AI Literacy Club`;

            // Render content: convert ## headings, **bold**, *italic*, blank lines to <p>
            function renderContent(raw) {
                return raw.trim()
                    .split(/\n\n+/)
                    .map(block => {
                        block = block.trim();
                        if (!block) return '';
                        if (block.startsWith('## ')) {
                            return `<h3>${block.slice(3)}</h3>`;
                        }
                        block = block
                            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                            .replace(/\*(.+?)\*/g, '<em>$1</em>');
                        return `<p>${block}</p>`;
                    })
                    .join('\n');
            }

            article.innerHTML = `
                <div class="blog-post-header">
                    <div class="blog-post-meta">
                        <span class="blog-category">${post.category}</span>
                        <span class="blog-date">${post.date}</span>
                        <span class="blog-author">by ${post.author}</span>
                    </div>
                    <h1 class="blog-post-title">${post.title}</h1>
                    <p class="blog-post-summary">${post.summary}</p>
                </div>
                <div class="blog-post-body">
                    ${renderContent(post.content)}
                </div>
                <div class="blog-post-footer">
                    <a href="blog.html" class="btn btn-secondary">← All Posts</a>
                </div>
            `;
        }
    </script>
